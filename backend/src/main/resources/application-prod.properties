# Production database configuration
spring.datasource.url=jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}

# Hibernate properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Session timeout
server.servlet.session.timeout=30m

# Static Paths to Frontend - in the Docker container, we copy frontend as a sibling directory to backend
spring.web.resources.static-locations=file:../frontend/,file:../frontend/static/,file:../frontend/css/,file:../frontend/js/,file:../frontend/assets/,classpath:/static/

# Data source dialect
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

logging.level.org.springframework.security=INFO
