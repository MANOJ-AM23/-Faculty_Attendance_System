spring.profiles.active=local
spring.datasource.url=jdbc:mysql://localhost:3306/faculty_attendance?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=root

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.servlet.session.timeout=30m
server.port=${PORT:8080}

# Spring Web static paths for Frontend
spring.web.resources.static-locations=file:../frontend/,file:../frontend/static/,file:../frontend/css/,file:../frontend/js/,file:../frontend/assets/,classpath:/static/

# Data source
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

logging.level.org.springframework.security=DEBUG
