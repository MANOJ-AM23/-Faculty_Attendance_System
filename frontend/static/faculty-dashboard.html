<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Faculty — Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>tailwind.config={theme:{extend:{colors:{primary:'#0f172a',accent:'#06b6d4'}}}};</script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <style>body{font-family:Inter,system-ui,Segoe UI,Roboto}</style>
    </head>
    <body class="min-h-screen bg-slate-50">
        <div class="flex">
            <aside id="sidebar" class="w-64 bg-white h-screen shadow-lg">
                <div class="p-6 border-b">
                    <div class="text-lg font-semibold">Faculty</div>
                    <div class="text-xs text-muted">Attendance</div>
                </div>
                <nav class="p-4 space-y-1 text-sm">
                    <a href="#daily" onclick="scrollToSection('daily')" class="block p-3 rounded-lg hover:bg-slate-100">Daily</a>
                    <a href="#monthly" onclick="scrollToSection('monthly')" class="block p-3 rounded-lg hover:bg-slate-100">Monthly</a>
                    <a href="#leave" onclick="scrollToSection('leave')" class="block p-3 rounded-lg hover:bg-slate-100">Apply Leave</a>
                    <a href="#my-leaves" onclick="scrollToSection('my-leaves')" class="block p-3 rounded-lg hover:bg-slate-100">My Leaves</a>
                    <a href="/logout" class="block p-3 rounded-lg text-rose-600">Logout</a>
                </nav>
            </aside>

            <main class="flex-1 p-6">
                <header class="flex items-center justify-between mb-6">
                    <div class="text-2xl font-semibold">Dashboard</div>
                    <div class="flex items-center gap-4">
                        <div class="text-sm text-muted">You</div>
                        <div class="w-10 h-10 rounded-full bg-slate-200"></div>
                    </div>
                </header>

                <section id="daily" class="grid grid-cols-3 gap-4 mb-6">
                    <div class="bg-white p-4 rounded-lg shadow-sm">
                        <div class="text-sm text-muted">Working Days</div>
                        <div id="totalWorking" class="text-xl font-semibold">—</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm">
                        <div class="text-sm text-muted">Present Days</div>
                        <div id="presentDays" class="text-xl font-semibold text-green-600">—</div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm">
                        <div class="text-sm text-muted">Leave Count</div>
                        <div id="leaveCount" class="text-xl font-semibold text-amber-500">—</div>
                    </div>
                </section>

                <section id="monthly" class="mb-6">
                    <div class="flex items-center justify-between mb-3">
                        <h3 class="text-lg font-semibold">Monthly Report</h3>
                        <div class="flex gap-2 items-center"><input id="monthYear" type="number" placeholder="Year" class="px-3 py-2 border rounded"/><input id="monthMonth" type="number" placeholder="Month" class="px-3 py-2 border rounded"/><button class="px-3 py-2 bg-primary text-white rounded" onclick="loadMonthly()">View</button></div>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm">
                        <canvas id="monthlyChart" height="120"></canvas>
                        <div id="percentage" class="mt-3 text-sm text-muted"></div>
                    </div>
                </section>

                <section id="leave" class="mb-6">
                    <h3 class="text-lg font-semibold mb-3">Apply for Leave</h3>
                    <div class="bg-white p-4 rounded-lg shadow-sm grid grid-cols-2 gap-4">
                        <input id="leaveFrom" type="date" class="px-3 py-2 border rounded" />
                        <input id="leaveTo" type="date" class="px-3 py-2 border rounded" />
                        <textarea id="leaveReason" class="col-span-2 px-3 py-2 border rounded" rows="3" placeholder="Reason"></textarea>
                        <div class="col-span-2 flex gap-2 justify-end"><button class="px-4 py-2 bg-primary text-white rounded" onclick="applyLeave()">Apply</button><div id="leaveMsg" class="self-center text-sm text-muted"></div></div>
                    </div>
                </section>

                <section id="my-leaves" class="mb-6">
                    <h3 class="text-lg font-semibold mb-3">My Leave Requests</h3>
                    <div class="bg-white p-4 rounded-lg shadow-sm">
                        <div class="overflow-auto"><table id="leaveTable" class="min-w-full text-sm"><thead class="bg-slate-50"><tr><th class="p-3">From</th><th class="p-3">To</th><th class="p-3">Reason</th><th class="p-3">Status</th></tr></thead><tbody></tbody></table></div>
                    </div>
                </section>
            </main>
        </div>

        <script src="/js/ui.js"></script>
        <script>
            let monthlyChart=null;
            function loadMonthly(){ const y=document.getElementById('monthYear').value; const m=document.getElementById('monthMonth').value; if(!y||!m) return; fetch(`/api/faculty/attendance/monthly?year=${y}&month=${m}`).then(r=>r.json()).then(data=>{ document.getElementById('percentage').innerText = `Attendance: ${ (data.percentage||0).toFixed(2)}%`; const labels = data.records.map(r=>r.date); const values = data.records.map(r=> r.status==='PRESENT'?1:0); if(monthlyChart) monthlyChart.destroy(); monthlyChart = new Chart(document.getElementById('monthlyChart'),{type:'bar',data:{labels, datasets:[{label:'Present (1=Present)',data:values,backgroundColor:'#60a5fa'}]}, options:{scales:{y:{beginAtZero:true, ticks:{stepSize:1}}}}}); }); }

            function applyLeave(){ const from=document.getElementById('leaveFrom').value; const to=document.getElementById('leaveTo').value; const reason=document.getElementById('leaveReason').value; if(!from||!to||!reason){ showToast('Please fill all fields','error'); return;} const params=new URLSearchParams(); params.append('from',from); params.append('to',to); params.append('reason',reason); fetch('/api/faculty/leave',{method:'POST', headers:{'Content-Type':'application/x-www-form-urlencoded'}, body:params.toString()}).then(()=>{ showToast('Leave applied'); loadLeaves(); }); }

            function loadLeaves(){ fetch('/api/faculty/leave').then(r=>r.json()).then(data=>{ const tbody=document.querySelector('#leaveTable tbody'); tbody.innerHTML=''; data.forEach(l=>{ const tr=document.createElement('tr'); tr.className='hover:bg-slate-50'; tr.innerHTML=`<td class='p-3'>${l.fromDate}</td><td class='p-3'>${l.toDate}</td><td class='p-3'>${l.reason}</td><td class='p-3'>${l.status}</td>`; tbody.appendChild(tr); }); }); }

            function markNow(){ fetch('/api/faculty/attendance/mark',{method:'POST'}).then(r=>r.json()).then(data=>{ showToast('Marked: '+(data.status||'OK')); }); }

            loadLeaves();
        </script>
    </body>
</html>
