<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width,initial-scale=1" />
        <title>Faculty Attendance — Login</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <script>tailwind.config = {theme:{extend:{colors:{primary:'#4f46e5',accent:'#06b6d4',muted:'#6b7280'}}}};</script>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
        <style>body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto}</style>
    </head>
    <body class="min-h-screen bg-gradient-to-br from-indigo-50 via-white to-sky-50 flex items-center justify-center">
        <div class="absolute top-6 left-6 flex items-center gap-3">
            <div class="w-12 h-12 rounded-lg bg-gradient-to-br from-primary to-accent flex items-center justify-center shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 11c2.21 0 4-1.79 4-4S14.21 3 12 3 8 4.79 8 7s1.79 4 4 4zM6 21v-2a4 4 0 014-4h4a4 4 0 014 4v2"/></svg>
            </div>
            <div>
                <div class="text-lg font-semibold text-slate-700">University Name</div>
                <div class="text-sm text-muted">Faculty Attendance</div>
            </div>
        </div>

        <main class="w-full max-w-md p-6">
            <div class="backdrop-blur-sm bg-white/60 rounded-2xl shadow-2xl overflow-hidden">
                <div class="p-8">
                    <h1 class="text-2xl font-semibold text-slate-800">Welcome back</h1>
                    <p class="text-sm text-muted mt-1">Sign in to manage attendance</p>

                    <form id="loginForm" method="post" action="/perform_login" class="mt-6 space-y-4" novalidate>
                        <div>
                            <label for="username" class="block text-sm font-medium text-slate-700">Username</label>
                            <input id="username" name="username" type="text" autocomplete="username" required class="mt-1 w-full px-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-primary transition" placeholder="admin" />
                        </div>

                        <div>
                            <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                            <div class="relative mt-1">
                                <input id="password" name="password" type="password" autocomplete="current-password" required class="w-full px-4 py-2 rounded-lg border border-slate-200 pr-12 focus:outline-none focus:ring-2 focus:ring-primary transition" placeholder="••••••••" />
                                <button type="button" id="togglePassword" class="absolute right-2 top-1/2 -translate-y-1/2 text-sm text-muted hover:text-slate-900">Show</button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <label class="flex items-center gap-2 text-sm"><input type="checkbox" name="remember" class="w-4 h-4 rounded border-slate-300"/> Remember me</label>
                            <a href="/forgot" class="text-sm text-primary hover:underline">Forgot?</a>
                        </div>

                        <div>
                            <button type="submit" class="w-full py-2 rounded-lg bg-gradient-to-r from-primary to-accent text-white font-semibold hover:shadow-lg transition transform hover:-translate-y-0.5">Sign in</button>
                        </div>
                    </form>

                    <div id="loginMsg" class="mt-4 text-sm text-red-600"></div>
                </div>

                <div class="bg-slate-50 px-8 py-3 text-xs text-muted text-center">Use <span class="font-medium">admin/admin</span> or <span class="font-medium">faculty1/faculty1</span> for demo</div>
            </div>
        </main>

        <script src="/js/ui.js"></script>
        <script>
            const form = document.getElementById('loginForm');
            form.addEventListener('submit', e => {
                if (!form.checkValidity()) { e.preventDefault(); showToast('Please complete required fields','error'); }
            });
            document.getElementById('togglePassword').addEventListener('click', ()=> togglePassword('password','togglePassword'));
            (function(){ const qs = new URLSearchParams(location.search); if(qs.has('error')) showToast('Invalid username or password','error'); if(qs.has('logout')) showToast('Logged out','info'); })();
        </script>
    </body>
</html>
