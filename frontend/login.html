<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Saru School - Faculty Attendance Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { theme: { extend: { colors: { primary: '#1e3a8a', accent: '#0ea5e9', muted: '#64748b' } } } };</script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto;
        }

        .bg-animated {
            background: linear-gradient(-45deg, #1e3a8a, #0f172a, #334155, #0ea5e9);
            background-size: 300% 300%;
            animation: gradientBG 20s ease infinite;
        }

        @keyframes gradientBG {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        @keyframes float {
            0% {
                transform: translateY(0px) rotate(-12deg);
            }

            50% {
                transform: translateY(-20px) rotate(-10deg);
            }

            100% {
                transform: translateY(0px) rotate(-12deg);
            }
        }

        @keyframes floatReverse {
            0% {
                transform: translateY(0px) rotate(12deg);
            }

            50% {
                transform: translateY(20px) rotate(10deg);
            }

            100% {
                transform: translateY(0px) rotate(12deg);
            }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        .logo-pulse {
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.7);
            }

            100% {
                box-shadow: 0 0 0 15px rgba(255, 255, 255, 0);
            }
        }
    </style>
</head>

<body class="min-h-screen bg-animated flex items-center justify-center relative overflow-hidden">
    <!-- Decorative background elements -->
    <div
        class="absolute top-[-20%] left-[-10%] w-[60%] h-[60%] bg-gradient-to-br from-white/10 to-transparent transform -rotate-12 rounded-[100px] pointer-events-none blur-3xl animate-[float_15s_ease-in-out_infinite]">
    </div>
    <div
        class="absolute bottom-[-20%] right-[-10%] w-[60%] h-[60%] bg-gradient-to-tl from-blue-400/20 to-transparent transform rotate-12 rounded-[100px] pointer-events-none blur-3xl animate-[floatReverse_12s_ease-in-out_infinite]">
    </div>

    <main class="w-full max-w-sm p-4 relative z-10">
        <style>
            /* Adding Tailwind shimmer animation manually for JIT */
            @keyframes shimmer {
                100% {
                    transform: translateX(100%);
                }
            }
        </style>
        <div class="glass-card rounded-2xl shadow-2xl overflow-hidden border border-white/20">

            <!-- Header with Logo -->
            <div class="pt-8 pb-5 px-6 text-center bg-gradient-to-b from-slate-50 to-transparent">
                <div class="relative inline-block">
                    <img src="assets/school-logo.jpg" alt="Saru School Logo"
                        onerror="if(!this.dataset.f){this.dataset.f=1;this.src='/assets/school-logo.jpg';}else{this.style.display='none';}"
                        class="w-20 h-20 mx-auto rounded-full object-cover border-4 border-white shadow-md mb-4 relative z-10 logo-pulse" />
                </div>
                <h1 class="text-xl font-extrabold text-slate-800 tracking-tight">Saru Educational Institution</h1>
                <p class="text-xs text-slate-500 font-medium mt-1">Faculty & Admin Portal</p>
            </div>

            <div class="px-6 pb-8">
                <!-- Login Role Toggle -->
                <div class="flex p-1 bg-slate-100 rounded-xl mb-6 items-center">
                    <button id="tabFaculty"
                        class="flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-white text-blue-700 shadow-sm"
                        onclick="switchLoginRole('faculty')">
                        <i class="fa-solid fa-chalkboard-user mr-2"></i>Faculty
                    </button>
                    <button id="tabAdmin"
                        class="flex-1 py-2 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-700"
                        onclick="switchLoginRole('admin')">
                        <i class="fa-solid fa-user-shield mr-2"></i>Admin
                    </button>
                </div>

                <!-- Login Section -->
                <div id="loginSection">
                    <form id="loginForm" method="post" action="/perform_login" class="space-y-5" novalidate
                        autocomplete="off">
                        <div>
                            <label for="username"
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Username</label>
                            <div
                                class="flex items-center border-b-2 border-slate-200 py-2 focus-within:border-blue-600 transition-colors">
                                <svg class="w-5 h-5 text-slate-400 mr-3" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                                <input id="username" name="username" type="text" autocomplete="username" required
                                    class="w-full bg-transparent text-base text-slate-800 placeholder-slate-400 focus:outline-none"
                                    placeholder="Enter your username" />
                            </div>
                        </div>

                        <div>
                            <label for="password"
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Password</label>
                            <div
                                class="flex items-center border-b-2 border-slate-200 py-2 focus-within:border-blue-600 transition-colors relative">
                                <svg class="w-5 h-5 text-slate-400 mr-3" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                    </path>
                                </svg>
                                <input id="password" name="password" type="password" autocomplete="current-password"
                                    required
                                    class="w-full bg-transparent text-base text-slate-800 placeholder-slate-400 focus:outline-none pr-12"
                                    placeholder="Enter your password" />
                                <button type="button" id="togglePassword"
                                    class="absolute right-0 text-xs font-bold text-slate-400 hover:text-blue-600 transition-colors">SHOW</button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between pt-2">
                            <label class="flex items-center gap-2 text-sm text-slate-600 font-medium cursor-pointer">
                                <input type="checkbox" name="remember"
                                    class="w-4 h-4 rounded border-slate-300 text-blue-600 focus:ring-blue-500" />
                                Remember me
                            </label>
                            <a href="#"
                                class="text-sm font-medium text-slate-500 hover:text-blue-600 transition-colors">Forgot
                                Password?</a>
                        </div>

                        <div class="pt-4">
                            <button type="submit"
                                class="relative overflow-hidden w-full py-3.5 rounded-xl bg-gradient-to-r from-blue-700 to-blue-500 text-white text-sm font-bold tracking-widest shadow-lg shadow-blue-500/30 hover:shadow-blue-500/60 transition-all duration-300 transform hover:-translate-y-1 group">
                                <span class="relative z-10 uppercase">Login as Faculty</span>
                                <div
                                    class="absolute inset-0 h-full w-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]">
                                </div>
                            </button>
                        </div>
                    </form>


                    <div id="loginMsg" class="mt-4 text-sm text-red-500 text-center font-medium"></div>
                </div> <!-- End loginSection -->

                <!-- Registration Section -->
                <div id="registerSection" class="hidden">
                    <div class="text-center mb-6">
                        <h2 class="text-xl font-bold text-slate-800">Create Account</h2>
                        <p class="text-sm text-slate-500">Register as a new faculty member</p>
                    </div>

                    <form id="registerForm" method="post" action="/register_faculty" class="space-y-5" novalidate
                        autocomplete="off">
                        <div>
                            <label for="regUsername"
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Choose
                                Username</label>
                            <div
                                class="flex items-center border-b-2 border-slate-200 py-2 focus-within:border-blue-600 transition-colors">
                                <svg class="w-5 h-5 text-slate-400 mr-3" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                </svg>
                                <input id="regUsername" name="username" type="text" required
                                    class="w-full bg-transparent text-base text-slate-800 placeholder-slate-400 focus:outline-none"
                                    placeholder="e.g. jdoe" />
                            </div>
                        </div>

                        <div>
                            <label for="regPassword"
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider mb-1.5">Choose
                                Password</label>
                            <div
                                class="flex items-center border-b-2 border-slate-200 py-2 focus-within:border-blue-600 transition-colors relative">
                                <svg class="w-5 h-5 text-slate-400 mr-3" fill="none" stroke="currentColor"
                                    viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z">
                                    </path>
                                </svg>
                                <input id="regPassword" name="password" type="password" required
                                    class="w-full bg-transparent text-base text-slate-800 placeholder-slate-400 focus:outline-none pr-12"
                                    placeholder="Min. 8 characters" />
                                <button type="button" id="toggleRegPassword"
                                    class="absolute right-0 text-xs font-bold text-slate-400 hover:text-blue-600 transition-colors">SHOW</button>
                            </div>
                        </div>

                        <div class="pt-4">
                            <button type="submit"
                                class="relative overflow-hidden w-full py-3.5 rounded-xl bg-gradient-to-r from-slate-700 to-slate-900 text-white text-sm font-bold tracking-widest shadow-lg shadow-slate-900/30 hover:shadow-slate-900/60 transition-all duration-300 transform hover:-translate-y-1 group">
                                <span class="relative z-10">REGISTER ACCOUNT</span>
                                <div
                                    class="absolute inset-0 h-full w-full bg-gradient-to-r from-transparent via-white/20 to-transparent -translate-x-full group-hover:animate-[shimmer_1.5s_infinite]">
                                </div>
                            </button>
                        </div>
                    </form>

                    <div class="mt-8 text-center border-t border-slate-100 pt-6">
                        <p class="text-sm text-slate-500 font-medium">Already have an account?</p>
                        <button id="showLogin"
                            class="mt-2 text-sm font-bold text-blue-600 hover:text-blue-800 hover:underline transition-colors tracking-wide">
                            BACK TO LOGIN
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <script src="/js/ui.js"></script>
    <script>
        function switchLoginRole(role) {
            const facultyBtn = document.getElementById('tabFaculty');
            const adminBtn = document.getElementById('tabAdmin');
            const loginBtn = document.querySelector('#loginForm button[type="submit"] span');

            if (role === 'faculty') {
                facultyBtn.className = "flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-white text-blue-700 shadow-sm";
                adminBtn.className = "flex-1 py-2 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-700";
                loginBtn.innerText = "LOGIN AS FACULTY";
            } else {
                adminBtn.className = "flex-1 py-2 text-sm font-bold rounded-lg transition-all bg-white text-indigo-700 shadow-sm";
                facultyBtn.className = "flex-1 py-2 text-sm font-bold rounded-lg transition-all text-slate-500 hover:text-slate-700";
                loginBtn.innerText = "LOGIN AS ADMIN";
            }
        }

        // Form Validation
        const form = document.getElementById('loginForm');
        form.addEventListener('submit', e => {
            if (!form.checkValidity()) {
                e.preventDefault();
                if (typeof showToast === 'function') showToast('Please complete required fields', 'error');
            }
        });

        const regForm = document.getElementById('registerForm');
        regForm.addEventListener('submit', e => {
            if (!regForm.checkValidity()) {
                e.preventDefault();
                if (typeof showToast === 'function') showToast('Please fill all registration fields', 'error');
            }
        });

        // Password Toggles
        const togglePass = (inputId, btnId) => {
            const input = document.getElementById(inputId);
            const btn = document.getElementById(btnId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = 'HIDE';
            } else {
                input.type = 'password';
                btn.textContent = 'SHOW';
            }
        };

        document.getElementById('togglePassword').addEventListener('click', () => togglePass('password', 'togglePassword'));
        document.getElementById('toggleRegPassword').addEventListener('click', () => togglePass('regPassword', 'toggleRegPassword'));



        // URL Params Handling
        (function () {
            const qs = new URLSearchParams(location.search);
            if (typeof showToast === 'function') {
                if (qs.has('error')) showToast('Invalid username or password', 'error');
                if (qs.has('logout')) {
                    showToast('Logged out', 'info');
                    // Explicitly clear fields on logout
                    document.getElementById('username').value = "";
                    document.getElementById('password').value = "";
                }
                if (qs.has('registered')) showToast('Registration successful! Please sign in.', 'success');
            }
        })();

        // Prevent showing filled details on back button or page reload
        window.addEventListener('pageshow', (event) => {
            document.getElementById('loginForm').reset();
            document.getElementById('username').value = "";
            document.getElementById('password').value = "";
        });
    </script>
</body>

</html>
